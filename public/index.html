<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ChatJimmy2API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=swap" rel="stylesheet">
    </noscript>
    <style>
        /* 核心变量与基础样式 */
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-secondary: #625B71;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-background: rgba(20, 20, 30, 0.75);
            --md-sys-color-surface: rgba(30, 30, 45, 0.85);
            --md-sys-color-surface-variant: rgba(50, 50, 70, 0.6);
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-outline: rgba(202, 196, 208, 0.4);
            --md-sys-color-error: #F44336;
            --md-sys-color-success: #4CAF50;
            --md-elevation-1: 0 1px 3px rgba(0,0,0,0.3);
            --md-elevation-2: 0 3px 6px rgba(0,0,0,0.4);
            --md-elevation-3: 0 8px 16px rgba(0,0,0,0.5);
            --md-shape-corner-small: 8px;
            --md-shape-corner-medium: 12px;
            --md-shape-corner-large: 16px;
            --md-shape-corner-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.85), rgba(30, 30, 50, 0.85)),
                        url('https://www.loliapi.com/acg/');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease;
        }

        .material-icons-round {
            font-family: 'Material Icons Round';
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-card {
            background: var(--md-sys-color-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--md-shape-corner-large);
            padding: 40px 32px;
            box-shadow: var(--md-elevation-3);
            border: 1px solid var(--md-sys-color-outline);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--md-sys-color-primary), #9C7FEA);
            border-radius: var(--md-shape-corner-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: var(--md-elevation-2);
        }

        .logo-icon .material-icons-round {
            font-size: 36px;
            color: var(--md-sys-color-on-primary);
        }

        .logo-title {
            font-size: 24px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            margin-bottom: 8px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: var(--md-sys-color-on-surface-variant);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 8px;
        }

        .form-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: var(--md-sys-color-surface-variant);
            border: 2px solid transparent;
            border-radius: var(--md-shape-corner-medium);
            color: var(--md-sys-color-on-surface);
            font-size: 16px;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--md-sys-color-primary);
            background: rgba(50, 50, 70, 0.8);
        }

        .form-input::placeholder {
            color: var(--md-sys-color-on-surface-variant);
        }

        .form-icon {
            position: absolute;
            left: 16px;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 22px;
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--md-sys-color-on-surface);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--md-shape-corner-medium);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            box-shadow: var(--md-elevation-1);
        }

        .btn-primary:hover {
            background: #7E6BB8;
            box-shadow: var(--md-elevation-2);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid var(--md-sys-color-error);
            border-radius: var(--md-shape-corner-small);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            color: #FF8A80;
            font-size: 14px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message .material-icons-round {
            font-size: 20px;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <span class="material-icons-round">api</span>
                </div>
                <h1 class="logo-title">ChatJimmy2API</h1>
                <p class="logo-subtitle">管理控制台</p>
            </div>

            <div id="error-message" class="error-message">
                <span class="material-icons-round">error</span>
                <span id="error-text">登录失败，请检查密码</span>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="password">访问密码</label>
                    <div class="form-input-wrapper">
                        <span class="material-icons-round form-icon">lock</span>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="请输入访问密码"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <span class="material-icons-round" id="password-icon">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span>登录</span>
                    <span class="material-icons-round">login</span>
                </button>
            </form>

            <div class="footer">
                <p>Powered by ChatJimmy2API</p>
            </div>
        </div>
    </div>

    <script>
        // 检查是否已登录
        const token = localStorage.getItem('admin_token');
        if (token) {
            window.location.href = '/dashboard';
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('password-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-message');
            
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div><span>登录中...</span>';
            errorDiv.classList.remove('show');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password: password }),
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = '/dashboard';
                } else {
                    throw new Error(data.message || '登录失败');
                }
            } catch (error) {
                document.getElementById('error-text').textContent = error.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<span>登录</span><span class="material-icons-round">login</span>';
            }
        });

        // 动态更换背景 (可选，如果需要每次加载都不同)
        window.onload = function() {
            document.body.style.backgroundImage = `linear-gradient(135deg, rgba(20, 20, 30, 0.85), rgba(30, 30, 50, 0.85)), url('https://www.loliapi.com/acg/?t=${Date.now()}')`;
        };
    </script>
</body>
</html>
